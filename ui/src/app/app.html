<div class="shell">
  <header class="topbar">
    <div class="brand">
      <span class="mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none">
          <rect x="1.5" y="1.5" width="21" height="21" rx="6" stroke="currentColor" stroke-width="1.5" />
          <path d="M7 9.5h7m0 0-2.4-2.4M14 9.5l-2.4 2.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M17 14.5h-7m0 0 2.4-2.4M10 14.5l2.4 2.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </span>
      <div class="wordmark">
        <span class="name">Agent Portal</span>
        <span class="tag mono">session dispatch</span>
      </div>
    </div>

    <nav class="nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Board</a>
      <a routerLink="/activity" routerLinkActive="active">Activity</a>
    </nav>

    <div class="status">
      @if (health(); as h) {
        <span class="dot ok" aria-hidden="true"></span>
        <span class="mono">core {{ h.appVersion }}</span>
        <span class="sep">·</span>
        <span class="mono">{{ h.adaptersRegistered }} adapters</span>
      } @else if (ipcError(); as e) {
        <span class="dot err" aria-hidden="true"></span>
        <span [title]="e">core unreachable</span>
      } @else {
        <span class="dot pending" aria-hidden="true"></span>
        <span>connecting…</span>
      }
    </div>
  </header>

  <router-outlet />
</div>
