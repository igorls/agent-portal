@if (isPeek) {
  <app-peek-panel />
} @else {
  <div class="shell">
    <header class="topbar" data-tauri-drag-region>
      <div class="brand" data-tauri-drag-region>
        <span class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none">
            <rect x="1.5" y="1.5" width="21" height="21" rx="6" stroke="currentColor" stroke-width="1.5" />
            <path d="M7 9.5h7m0 0-2.4-2.4M14 9.5l-2.4 2.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M17 14.5h-7m0 0 2.4-2.4M10 14.5l2.4 2.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </span>
        <span class="name" data-tauri-drag-region>Agent Portal</span>
      </div>

      <nav class="nav">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Board</a>
        <a routerLink="/activity" routerLinkActive="active">Activity</a>
      </nav>

      <div class="drag-spacer" data-tauri-drag-region></div>

      <div class="status">
        @if (health(); as h) {
          <span class="dot ok" aria-hidden="true"></span>
          <span class="mono">core {{ h.appVersion }}</span>
          <span class="sep">·</span>
          <span class="mono">{{ h.adaptersRegistered }} adapters</span>
        } @else if (ipcError(); as e) {
          <span class="dot err" aria-hidden="true"></span>
          <span [title]="e">core unreachable</span>
        } @else {
          <span class="dot pending" aria-hidden="true"></span>
          <span>connecting…</span>
        }
      </div>

      <div class="win-controls">
        <button class="win-btn" title="Hide to tray" (click)="tauri.hideToTray()" aria-label="Minimize to tray">
          <svg viewBox="0 0 10 10" width="10" height="10"><path d="M1 5h8" stroke="currentColor" stroke-width="1" stroke-linecap="round" /></svg>
        </button>
        <button class="win-btn" [title]="tauri.maximized() ? 'Restore' : 'Maximize'" (click)="tauri.toggleMaximizeWindow()" aria-label="Maximize">
          @if (tauri.maximized()) {
            <svg viewBox="0 0 10 10" width="10" height="10">
              <rect x="1.5" y="2.5" width="5" height="5" fill="none" stroke="currentColor" stroke-width="1" />
              <path d="M3.5 2.5V1.5h5v5H7.5" fill="none" stroke="currentColor" stroke-width="1" />
            </svg>
          } @else {
            <svg viewBox="0 0 10 10" width="10" height="10"><rect x="1.5" y="1.5" width="7" height="7" fill="none" stroke="currentColor" stroke-width="1" /></svg>
          }
        </button>
        <button class="win-btn close" title="Close to tray" (click)="tauri.hideToTray()" aria-label="Close">
          <svg viewBox="0 0 10 10" width="10" height="10"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1" stroke-linecap="round" /></svg>
        </button>
      </div>
    </header>

    <router-outlet />
  </div>
}
