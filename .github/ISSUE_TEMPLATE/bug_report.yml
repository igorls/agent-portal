name: Bug report
description: Something isn't working as expected
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! For **security vulnerabilities**, please do not
        file a public issue — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: Steps to reproduce, expected vs. actual behavior.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Agent Portal version
      description: From the app, or the release tag / commit you built.
      placeholder: e.g. v0.1.1
    validations:
      required: true
  - type: dropdown
    id: agents
    attributes:
      label: Which agent(s) were involved?
      description: The source/target agent for a migration, or the agent whose sessions misbehaved.
      multiple: true
      options:
        - Claude Code
        - Codex CLI
        - OpenCode
        - Antigravity
        - GitHub Copilot
        - Grok
        - Not applicable
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or errors
      description: Any relevant error text. Please redact anything sensitive.
      render: shell
    validations:
      required: false
