name: Release

# Build installers for every platform and attach them to a GitHub Release.
# Trigger by pushing a version tag, e.g.:
#   git tag v0.1.1 && git push origin v0.1.1
# The release is created as a draft so you can review the assets and notes
# before publishing. workflow_dispatch lets you dry-run a build from any branch
# without a tag (no release is published in that case).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal binary covers both Apple Silicon and Intel Macs.
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          # 22.04 keeps the AppImage/deb glibc requirement low for compatibility.
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # tauri-action drives the build via `pnpm tauri build`, so the root
      # @tauri-apps/cli must be installed; the UI deps are needed for the
      # beforeBuildCommand (pnpm --dir ui build).
      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          pnpm --dir ui install --frozen-lockfile

      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          certificate_path="$RUNNER_TEMP/developer-id-application.p12"
          keychain_path="$RUNNER_TEMP/agent-portal-signing.keychain-db"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$keychain_path"
          security list-keychain -d user -s "$keychain_path"

          signing_identity="$(
            security find-identity -v -p codesigning "$keychain_path" \
              | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' \
              | head -n 1
          )"
          if [ -z "$signing_identity" ]; then
            echo "Developer ID Application identity not found in imported certificate" >&2
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$signing_identity" >> "$GITHUB_ENV"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
        with:
          # Only a v* tag push creates/publishes a release. A workflow_dispatch
          # run leaves these empty, so tauri-action just builds the installers as
          # a dry run without publishing anything (matching this file's comment).
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('Agent Portal {0}', github.ref_name) || '' }}
          releaseBody: 'Download the installer for your platform from the assets below.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Tauri notarizes and staples the .app before it creates the disk image.
      # Submit the final DMG too so the downloaded installer has its own
      # offline Gatekeeper ticket (the same validation as our local release).
      - name: Notarize and staple macOS disk image
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          dmg_path="$(find target/universal-apple-darwin/release/bundle/dmg -name '*.dmg' -print -quit)"
          if [ -z "$dmg_path" ]; then
            echo "Universal macOS DMG was not produced" >&2
            exit 1
          fi

          xcrun notarytool submit "$dmg_path" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$dmg_path"
          xcrun stapler validate "$dmg_path"

      # tauri-action uploads assets before subsequent steps run. Replace the
      # tagged DMG with the separately notarized, stapled version above.
      - name: Replace release DMG with notarized artifact
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dmg_path="$(find target/universal-apple-darwin/release/bundle/dmg -name '*.dmg' -print -quit)"
          gh release upload "${{ github.ref_name }}" "$dmg_path" --clobber
