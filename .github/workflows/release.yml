name: Release

# Build installers for every platform and attach them to a GitHub Release.
# Trigger by pushing a version tag, e.g.:
#   git tag v0.1.1 && git push origin v0.1.1
# The release is created as a draft so you can review the assets and notes
# before publishing. workflow_dispatch lets you dry-run a build from any branch
# without a tag (no release is published in that case).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal binary covers both Apple Silicon and Intel Macs.
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          # 22.04 keeps the AppImage/deb glibc requirement low for compatibility.
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # tauri-action drives the build via `pnpm tauri build`, so the root
      # @tauri-apps/cli must be installed; the UI deps are needed for the
      # beforeBuildCommand (pnpm --dir ui build).
      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          pnpm --dir ui install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Agent Portal ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your platform from the assets below.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
